services:
  pit-model:
    build:
      context: .
      dockerfile: docker/model/Dockerfile
    volumes:
      - pit-models:/models/pit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_REPO=${MODEL_REPO:-EryriLabs/PIT-GGUF}
      - GGUF_FILE=${GGUF_FILE:-pit_q8_0.gguf}
      - MODEL_DIR=/models/pit
      - N_CTX=${N_CTX:-16384}
      - N_GPU_LAYERS=${N_GPU_LAYERS:--1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    restart: unless-stopped
    ipc: host

  pit-voice:
    build:
      context: .
      dockerfile: docker/voice/Dockerfile
    ports:
      - "${PIT_PORT:-3002}:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - TTS_DEVICE=${TTS_DEVICE:-cuda}
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_BASE=http://pit-model:8000
      - VOICE_DIR=/voices
    volumes:
      - pit-voice-cache:/root/.cache
      - ./chatterbox_voices:/voices:ro
    depends_on:
      pit-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

volumes:
  pit-models:
  pit-voice-cache:
